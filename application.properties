# ── Spring Profili & Temel Ayarlar ────────────────────────────────────────────
spring.profiles.active=default

# ── BFM Arayüz & Cluster Ayarları ─────────────────────────────────────────────
app.bfm-hc-clustername=BFMCluster 
server.port=9994
watcher.cluster-port=9994 
management.endpoints.web.exposure.include=health,info

# ── PostgreSQL Küme Yönetimi ──────────────────────────────────────────────────
## Temel Bağlantı Bilgileri
server.pglist=minipg-node1:5432,minipg-node2:5432
server.pguser=postgres 
server.pgpassword=postgres 

## Detaylı Konfigürasyon
bfm.pg.host=minipg-node1,minipg-node2
bfm.pg.port=5432
bfm.pg.user=${server.pguser}
bfm.pg.password=${server.pgpassword}
bfm.pg.connect-timeout=5
bfm.pg.socket-timeout=10

# ── Replikasyon Yönetimi ──────────────────────────────────────────────────────
## Failover Davranışları
bfm.basebackup-slave-join=true
bfm.ex-master-behavior=rejoin
bfm.failover-delay-ms=5000
bfm.replication-check-interval=3000

## Replikasyon Node Listesi ve Modu
minipg.replication.nodes=minipg-node1:5432,minipg-node2:5432
minipg.replication.mode=async  

## PostgreSQL Binary Yolları (BURAYI SOR)
bfm.pg-rewind-path=/usr/pgsql-16/bin/pg_rewind
bfm.basebackup-command=/usr/pgsql-16/bin/pg_basebackup
bfm.psql-path=/usr/pgsql-16/bin/psql
# Container'lar birbirinin dosyalarını göremediği için, BFM'ye kendi içindeki binary'lerin yolunu açıkça söylendi

# ── Sağlık Kontrolleri ────────────────────────────────────────────────────────
bfm.health-check.timeout=10s
bfm.health-check.retry-count=3
bfm.health-check.initial-delay=30s


## TLS/SSL (Devre Dışı)
bfm.use-tls=false
bfm.user-crypted=false
server.ssl.enabled=false



